# config/tools.yaml
# ------------------------------------------------------------------
# Single source of truth for tools the LLM can invoke.
# Edit this file to add/remove tools or change descriptions; parameter
# schemas stay in server.js (PARAM_SCHEMAS) for OpenAI compatibility.
# ------------------------------------------------------------------

tools:
  - name: browse
    description: |
      Fetch a web page or search the web. You HAVE this tool—use it whenever the user
      asks to visit a site, check a URL, or look something up (e.g. "visit agentchainlab.com",
      "find out more about nostr"). Pass a full URL to fetch that page directly, or any
      search phrase: the server tries DuckDuckGo Instant Answer, then Wikipedia opensearch
      on a simplified keyword query, then fetches the first useful page for title/snippet/excerpt.
    module: ./tools/browser.js
    handler: browse
    enabled: true
    options:
      timeoutMs: 8000
      maxSnippetChars: 500

  - name: fetch_url
    description: |
      Make HTTP GET or POST requests to external APIs. You HAVE this tool—use it when the user
      asks to onboard, call an API, or do something that requires POST (e.g. AgentChain onboard).
      For AgentChainLab onboarding: method POST, url https://app.agentchainlab.com/api/agent/onboard,
      body "{}" or "{\"agent_name\":\"...\"}". For GET (e.g. balance): method GET, url with query params.
      Only HTTPS URLs are allowed. Do NOT say you cannot make HTTP requests—call this tool.
    module: ./tools/fetch.js
    handler: fetchUrl
    enabled: true

  - name: doc_crawl
    description: |
      Crawl a documentation site and save all pages to the workspace. Fetches the base URL (e.g. https://docs.bebop.xyz/bebop),
      parses the page for same-section links, fetches each linked page, strips HTML to text, and saves to workspace under
      save_to (e.g. docs/bebop) as .md files plus per-page metadata (.json) and TOC.md. Use when the user wants to pull the full doc set for later analysis.
      Optional save_to (workspace path prefix) and max_pages (default 30, max 100).
    module: ./tools/doc-crawl.js
    handler: docCrawl
    enabled: true

  - name: doc_index
    description: |
      Build or refresh the SQLite FTS index for a workspace docs folder (e.g. after doc_crawl). Pass root (workspace-relative path like docs/bebop).
      Enables fast full-text search via doc_search. Run once per crawl or when docs change.
    module: ./tools/doc-index.js
    handler: docIndex
    enabled: true

  - name: doc_search
    description: |
      Full-text search over **indexed documentation** (crawled docs in workspace/docs/*, e.g. docs/bebop). Use when the user wants to find something *in the docs*. Pass query (FTS5 syntax) and optional limit (default 10). Returns path, title, snippet, url. NOT for "did we talk about X?" — use conversation_search for that.
    module: ./tools/doc-search.js
    handler: docSearch
    enabled: true

  - name: read_docs_folder
    description: |
      Read an entire docs folder (e.g. after doc_crawl). Returns all .md files as one digest with truncated per-file
      chunks so context stays reasonable. Optionally writes SUMMARY.md in that folder listing each file with a one-line
      preview—so when the user says "tell me more about X" you can workspace_read the path from the summary.
      Pass path (e.g. docs/bebop). Optional max_per_file (default 2000), max_total (default 28000), write_summary (default true).
    module: ./tools/read-docs-folder.js
    handler: readDocsFolder
    enabled: true

  - name: file_write
    description: Save a file (content and filename). Returns file id for later read or download.
    module: ./tools/files.js
    handler: fileWrite
    enabled: true

  - name: file_read
    description: Read a file by id. Use after file_write or when user asks to open a file.
    module: ./tools/files.js
    handler: fileRead
    enabled: true

  - name: file_list
    description: List saved files (id, filename, size).
    module: ./tools/files.js
    handler: fileList
    enabled: true

  - name: generate_image
    description: Generate an image from a text prompt (diffusion). Use when the user asks to draw, create an image, or generate a picture.
    module: ./tools/image.js
    handler: generateImage
    enabled: true
    options:
      defaultSize: "1024x1024"

  - name: analyze_image
    description: Analyse an uploaded image (describe it, OCR text, answer a question). Use when the user attaches an image and asks what it shows, or to extract text. Pass the file_id from the attachment message.
    module: ./tools/vision.js
    handler: analyzeImage
    enabled: true

  - name: heartbeat
    description: Get a lightweight health-check payload (timestamp, status, memory, pid). Use when the user asks if the bot is alive or for a status check.
    module: ./tools/heartbeat.js
    handler: heartbeat
    enabled: true

  - name: cronjob
    description: Schedule a recurring task with a cron expression. Task must be one of log, heartbeat, check_btc. Use expression '0 * * * *' for every hour (e.g. for check_btc to monitor Bitcoin price). Example '*/5 * * * *' = every 5 minutes.
    module: ./tools/cronjob.js
    handler: scheduleCron
    enabled: true

  - name: get_btc_price
    description: Get current Bitcoin price in USD from CoinGecko. Use when the user asks for BTC price. To alert when price drops below 65k, schedule cronjob with task 'check_btc' and expression '0 * * * *' (hourly); alerts go to data/memory/alerts.md and GET /api/alerts.
    module: ./tools/price.js
    handler: getBtcPriceUsd
    enabled: true

  - name: workspace_read
    description: |
      Read a file from the workspace. Path must be a file path from workspace_tree's file_paths. Do not pass a directory. After reading, reply with content or a summary that MUST cite specific content from the file (e.g. section titles, parameter names, or phrases that appear in it). If you got no content (e.g. ok false or empty response), say clearly that you could not read the file and do NOT invent a summary. Do not mention eligibility, liquidity providers, reward formulas, or contact emails unless they actually appear in the file. Never respond with only raw JSON.
    module: ./tools/workspace.js
    handler: workspaceRead
    enabled: true

  - name: workspace_write
    description: Create or overwrite a file in the workspace folder. Path is relative (e.g. memory/notes.md). Creates parent directories if needed.
    module: ./tools/workspace.js
    handler: workspaceWrite
    enabled: true

  - name: workspace_delete
    description: Delete a file in the workspace folder. Path relative to workspace. Fails for directories.
    module: ./tools/workspace.js
    handler: workspaceDelete
    enabled: true

  - name: workspace_list
    description: List files and subdirectories in a workspace path (one level). Pass path (e.g. memory) or omit for workspace root. **Required** for "list workspace" / ls-style questions—never invent filenames; report only tool output.
    module: ./tools/workspace.js
    handler: workspaceList
    enabled: true

  - name: workspace_tree
    description: Full workspace directory tree in one call (tree string + file_paths). **Use first** when the user asks what's in the workspace or wants a file list—do not fabricate directories. Then workspace_read paths from file_paths. Optional path (e.g. . or memory), max_depth (default 20). For shell listings use exec instead.
    module: ./tools/workspace.js
    handler: workspaceTree
    enabled: true

  - name: exec
    description: |
      Run a shell command in the workspace sandbox. The command runs with the workspace (or workdir) as the current directory. Use to run scripts you created with workspace_write (e.g. node sandbox/script.js, python3 sandbox/script.py, npm install). Pass command (required), optional workdir (relative to workspace, default .), optional timeout in seconds (default 60, max 300). Output is capped at 1 MiB. Do not pass env overrides or arbitrary shell that escapes the workspace—workdir must stay inside workspace.
    module: ./tools/exec.js
    handler: runExec
    enabled: true

  - name: conversation_search
    description: |
      Search **our past chat messages** (conversation history in the DB). Use when the user asks "did we talk about X?", "what did we discuss?", or to find past conversations about a topic. Pass query (e.g. "wallets", "Bebop API") and optional limit (default 20, max 50). Returns conversation_id, excerpt, created_at. Do NOT use doc_search for "did we discuss" — doc_search is for documentation only.
    enabled: true

  - name: solana_address
    description: |
      Get the Solana public address of the **app wallet** (already configured in Settings; no user input needed). Use when the user asks for the wallet address, "what are your wallet balances", or "where do I send funds". CRITICAL: There is NO account_address tool in this app—always use solana_address. Do NOT ask the user for an address or file; just call this tool.
    module: ./tools/solana.js
    handler: solanaAddress
    enabled: true

  - name: solana_balance
    description: |
      Get SOL balance (and SPL token list) for the **app wallet** (already configured; no user input needed). Use when the user asks for balance, "what are your wallet balances", SOL balance, USDC, or "check my wallet". CRITICAL: There is NO account_balance tool in this app—always use solana_balance. Do NOT ask for an address or file; call this tool directly.
      Response SPL rows include **mint**, **decimals**, **uiAmount**, and when present **token_symbol** (server-known only: e.g. USDC, USDT, SABTC, SAETH, SAUSD). **Never** assign a ticker to a row that has no token_symbol—report mint+decimals+uiAmount only. Do not invent USD totals from balances.
    module: ./tools/solana.js
    handler: solanaBalance
    enabled: true

  - name: solana_transfer
    description: Send SOL to a recipient address. Pass to (base58 address) and amount_sol (number). Use when the user asks to send SOL. Do not send without clear user intent; confirm amount and recipient.
    module: ./tools/solana.js
    handler: solanaTransfer
    enabled: true

  - name: solana_network
    description: Get current Solana RPC URL and cluster (mainnet-beta, devnet, testnet). Like listing which network the app wallet is using.
    module: ./tools/solana.js
    handler: solanaNetwork
    enabled: true

  - name: solana_token_balance
    description: |
      Get SPL token balance for the **app wallet** by default. For **SABTC**, **SAETH**, or **SAUSD** / agent dollars, pass **token_symbol** only (e.g. `{"token_symbol":"SABTC"}`)—the server resolves the canonical mint (same as solana_agent_token_send); do not paste mints for those three (avoids Non-base58 / BLOCKED). For other tokens (e.g. USDC), pass **mint** (full base58). Omit owner for the app wallet. Returns balance, uiAmount, optional per-account breakdown.
    module: ./tools/solana.js
    handler: solanaTokenBalance
    enabled: true

  - name: solana_transfer_spl
    description: Send SPL (token) to a recipient. Pass mint (token mint address), to (recipient base58), amount (integer string in smallest units). Optionally decimals for display. Creates recipient token account if needed. Use when the user asks to send a token (e.g. USDC).
    module: ./tools/solana.js
    handler: solanaTransferSpl
    enabled: true

  - name: solana_agent_token_send
    description: |
      **Native capability:** send **SABTC**, **SAETH**, or **SAUSD** from the app wallet by **symbol**—canonical mints are built in; you were born with this tool (no mint lookup for these three). Pass token_symbol, to, and either **amount** (smallest units string) or **amount_ui** (human decimal). Operators may override mints in Settings (**SA_AGENT_TOKENS** or SABTC/SAETH/SAUSD keys). Fails if estimated **network fee** exceeds 0.001 SOL; checks token balance and SOL for fee + new-ATA rent before sending. **Tier 4** only (same as solana_transfer / solana_transfer_spl).
    module: ./tools/solana.js
    handler: solanaAgentTokenSend
    enabled: true

  - name: treasury_pool_swap
    description: |
      **Born-with treasury trading:** swap **SABTC↔SAUSD** or **SAETH↔SAUSD** on Orca Whirlpools (Orca SDK only—no Jupiter). Same app wallet as **solana_token_balance** / **solana_agent_token_send**. Pass **input_token_symbol**, **output_token_symbol**, **amount** or **amount_ui**. **Not** gated by Settings Jupiter toggles (**SWAPS_ENABLED** / **SWAPS_EXECUTION_ENABLED**). Use **dry_run:true** to simulate without sending. **Tier 4.** No liquidity provision.
    module: ./tools/treasury-pool-swap.js
    handler: treasuryPoolSwap
    enabled: true

  - name: treasury_pool_info
    description: |
      **Read-only** Whirlpool snapshot for treasury pools (**pair:** `SABTC_SAUSD` default or `SAETH_SAUSD`) or **pool_address**. Matches solanaagent.app logic: Orca REST **GET /v2/solana/pools/{address}**, else **on-chain** decode (vault balances, spot price as token B per 1 token A, tick, liquidity, fees). Optional **orca_proxy_base_url** e.g. `https://www.solanaagent.app/api` to hit the same **/orca/pool/…** proxy first. Use for market-making context; **not** an executable quote—use **treasury_pool_swap** with **dry_run:true** to simulate a trade size. **Read-only; allowed at Tier 2+** (not a swap send).
    enabled: true

  - name: solana_tx_history
    description: Get recent transaction signatures for the app wallet. Pass optional limit (default 20, max 50). Returns list of signature, blockTime, err, slot.
    module: ./tools/solana.js
    handler: solanaTxHistory
    enabled: true

  - name: solana_tx_status
    description: Check status of a transaction by signature. Pass signature (base58). Returns status (success, failed, not_found), confirmationStatus, err if failed.
    module: ./tools/solana.js
    handler: solanaTxStatus
    enabled: true

  - name: jupiter_price
    description: Get SOL or other token USD price from Jupiter. Pass ids (optional, default SOL) e.g. "SOL" or comma-separated mint addresses. Returns usdPrice and optional priceChange24h.
    module: ./tools/jupiter.js
    handler: jupiterPrice
    enabled: true

  - name: get_sol_price_usd
    description: |
      Get SOL price in USD from CoinGecko—the SAME source as the Wallet screen. Use this (not jupiter_price) when converting "$X" to lamports for a swap (e.g. "$5 swap"). So the USD amount the user sees on the Wallet matches the swap: amount_lamports = round(X / price * 1e9). Returns price, source "coingecko".
    enabled: true

  - name: hyperliquid_price
    description: |
      **Hyperliquid perp mid prices (USD).** POST `https://api.hyperliquid.xyz/info` with `{ "type": "allMids" }`. Default coins **BTC** and **ETH**; optional **`coins`** array e.g. `["BTC","ETH","SOL"]`. Returns **`mids_usd`** and **`agent_report`**. Use to compare treasury pool implied prices vs CEX-style perp mids—not executable on Solana. Read-only; any tier.
    enabled: true

  - name: jupiter_quote
    description: Get a swap quote from Jupiter (no execution). Pass input_mint, output_mint (default SOL->USDC), amount (in smallest units, default 1 SOL). Returns outAmount, priceImpact.
    module: ./tools/jupiter.js
    handler: jupiterQuote
    enabled: true

  - name: jupiter_swap_prepare
    description: |
      The ONLY way to start a swap. Do NOT simulate or describe swaps in text—call this tool. Prepares a Jupiter swap intent (no execution). Call when the user wants to swap (e.g. "sell SOL", "swap to USDC"). Pass input_mint, output_mint (default SOL->USDC), amount in smallest units, optional slippage_bps. Returns intent_id, expected_out, min_out. You MUST copy the intent_id character-for-character from this response when you show it to the user or pass it to confirm/execute—never type a different or pattern-based ID (e.g. 0a1b2c3d-e4f5-6789-...). The server rejects fabricated/pattern intent_ids. Tier 4.
    module: ./tools/jupiter.js
    handler: jupiterSwapPrepare
    enabled: true

  - name: jupiter_swap_cancel
    description: |
      Cancel a prepared or confirmed swap intent by intent_id. Use when the user says "cancel that swap". intent_id must be one returned by jupiter_swap_prepare. Does not move funds. Tier 4.
    enabled: true

  - name: jupiter_swap_confirm
    description: |
      Confirm a prepared swap intent by intent_id. Use the EXACT intent_id from a jupiter_swap_prepare response (copy character-for-character). Pattern IDs (e.g. 0a1b2c3d-e4f5-6789-abcd-ef0123456789) are rejected by the server. Call when the user says "confirm swap <intent_id>". Must be called before jupiter_swap_execute. Tier 4.
    enabled: true

  - name: jupiter_swap_execute
    description: |
      Execute a confirmed swap intent. intent_id MUST be the exact value returned by jupiter_swap_prepare (copy character-for-character). Pattern/fabricated IDs (e.g. 0a1b2c3d-...) are rejected. Call only after prepare and confirm. Tier 4; execution must be enabled in Settings.
    enabled: true

  - name: sovereign_transaction
    description: |
      Atomic Jupiter swap runner: prepare → confirm → execute for a single swap. Pass input_mint, output_mint (defaults SOL->USDC), and amount in smallest units (lamports). The backend prepares an intent, confirms it, and then calls jupiter_swap_execute. Returns nested prepare/confirm/execute results including any signature and SOLSCAN_URL. The agent should use this when it wants a one-shot sovereign swap instead of calling confirm/execute separately. Tier 4.
    enabled: true

  - name: get_swap_settings
    description: |
      Get the current swap execution settings from the app (source of truth). Returns executionEnabled, executionDryRun, and modeSummary. Call this when the user asks about swap settings, execution mode, dry run, or why swaps are/aren't broadcasting. Report only the values returned; never assume "Dry Run" or "Live" without calling this tool.
    enabled: true

  - name: clear_expired_swap_intents
    description: |
      Remove expired and stale swap intents from the DB (prepared/confirmed/expired/cancelled that are past their expiry). Keeps succeeded/failed for audit. Call when the user says "clear old transactions", "clear old swap intents", or after a new chat so old intents don't cause "Not found". Returns deleted count.
    enabled: true

  - name: bulletin_create_payment_intent
    description: |
      Create a paid posting intent on solanaagent.app (Clawstr publish flow). Pass optional wallet_address; defaults to app wallet from Settings. Returns payment_intent.id plus payment.treasury_solana_address, payment.amount_lamports, and payment.reference. The live API is POST-only at /api/v1/bulletin/payment-intent—GET returns 404; do not treat that as unavailable.
    enabled: true

  - name: bulletin_get_latest_intent
    description: |
      Read the latest pending local bulletin payment intent cached by this app runtime. Useful for sidebar/UI continuity and factual state checks.
    enabled: true

  - name: bulletin_post
    description: |
      Publish on solanaagent.app Clawstr (free only): POST /api/v1/bulletin/post with CLAWSTR_AGENT_CODE + content. Requires CLAWSTR_AGENT_CODE in Settings (encrypted) or CLAWSTR_AGENT_CODE in .env when using ./run.sh. No SOL transfer. Returns ok true with nostr_event_id, mode agent_code, or ok false with stage (validate|post) and error if code missing or API rejects. Tier 1 cannot run mutating tools. For paid on-chain posting use the app sidebar flow (payment intent + approve-and-post), not this tool.
    enabled: true

  - name: bulletin_approve_and_post
    description: |
      Alias of bulletin_post (same free agent_code behavior). Prefer bulletin_post in new prompts.
    enabled: true

  - name: clawstr_health
    description: |
      Read-only: GET solanaagent.app /api/v1/clawstr/health — Nostr bridge status, public npub, whether signing is configured (see site API reference). Returns ok, agent_report (markdown-ready summary for the user), summary. Tier-safe read.
    enabled: true

  - name: clawstr_feed
    description: |
      Read-only: GET /api/v1/clawstr/feed — kind 1111 posts from the solanaagent Clawstr subclaw. Optional limit (max 100), ai_only (NIP-32 AI-tagged posts). Returns agent_report with numbered excerpts, posts_preview, summary. Use for "what's on Clawstr", "latest Nostr posts", feed samples.
    enabled: true

  - name: clawstr_communities
    description: |
      Read-only: GET /api/v1/clawstr/communities — curated community list for solanaagent.app panels. Returns agent_report and summary.count.
    enabled: true

  - name: bulletin_public_feed
    description: |
      Read-only: GET /api/v1/bulletin/feed — public solanaagent.app feed (watch-only; not posting). Optional limit. Returns agent_report with post excerpts; to publish use bulletin_post.
    enabled: true

  - name: bulletin_public_health
    description: |
      Read-only: GET /api/v1/bulletin/health — solanaagent.app feed service status. Returns agent_report and summary.
    enabled: true

  - name: drift_perp_price
    description: Get SOL-PERP mark price (USD). Uses Jupiter SOL price as proxy. Optional market_index (default 0).
    module: ./tools/drift.js
    handler: driftPerpPrice
    enabled: true

  - name: drift_positions
    description: Get user's Drift perp positions. Requires configured wallet and Drift user account.
    module: ./tools/drift.js
    handler: driftPositions
    enabled: true

  - name: drift_place_order
    description: Place a perp order on Drift (stub; not yet implemented).
    module: ./tools/drift.js
    handler: driftPlaceOrder
    enabled: true

  - name: kamino_health
    description: Get Kamino lending health factor for the configured wallet. Requires Kamino SDK.
    module: ./tools/kamino.js
    handler: kaminoHealth
    enabled: true

  - name: kamino_positions
    description: Get Kamino lending positions (deposits, borrows). Requires Kamino SDK and wallet.
    module: ./tools/kamino.js
    handler: kaminoPositions
    enabled: true

  - name: kamino_deposit
    description: Deposit to Kamino (stub; not yet implemented).
    module: ./tools/kamino.js
    handler: kaminoDeposit
    enabled: true

  - name: raydium_quote
    description: Get Raydium swap quote (stub; use jupiter_quote for now).
    module: ./tools/raydium.js
    handler: raydiumQuote
    enabled: true

  - name: raydium_market_detect
    description: Detect pump.fun to Raydium migration (stub).
    module: ./tools/raydium.js
    handler: raydiumMarketDetect
    enabled: true

  - name: bet_markets
    description: List Drift BET / prediction markets (stub).
    module: ./tools/bet.js
    handler: betMarkets
    enabled: true

  - name: bet_positions
    description: Get user prediction market positions (stub).
    module: ./tools/bet.js
    handler: betPositions
    enabled: true
